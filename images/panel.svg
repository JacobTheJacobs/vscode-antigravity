  <path d="M4.2 19.2C4.2 10.4 7.2 6.4 12 6.4s7.8 4 7.8 12.8"
        fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="12" cy="3.1" r="1.8" fill="currentColor"/>
  <rect x="8.2" y="21" width="7.6" height="1.6" rx="0.8"
        fill="currentColor" opacity="0.45"/>
</svg>
