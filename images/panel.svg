  <path d="M4 20V13.2C4 8 7.4 5 12 5s8 3 8 8.2V20"
        fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
  <rect x="10.6" y="2.6" width="2.8" height="2.8" rx="0.6" fill="currentColor"/>
  <rect x="6.9" y="4.0" width="2.4" height="2.4" rx="0.5" fill="currentColor" opacity="0.7"/>
  <rect x="14.7" y="4.0" width="2.4" height="2.4" rx="0.5" fill="currentColor" opacity="0.7"/>
</svg>
